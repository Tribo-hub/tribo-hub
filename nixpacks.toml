# Build no Railway/Nixpacks.
# Node 22 (satisfaz o engine do pnpm 11) + corepack ATUALIZADO (corrige o bug
# ERR_VM_DYNAMIC_IMPORT_CALLBACK_MISSING do corepack 0.24.1). O corepack gerencia
# o pnpm (shim no PATH), então as fases de build encontram o pnpm normalmente.
providers = ["node"]

[phases.setup]
nixPkgs = ["nodejs_22", "openssl"]

[phases.install]
cmds = [
  "npm install -g corepack@latest",
  "corepack enable",
  "corepack prepare pnpm@11.5.1 --activate",
  "pnpm install --frozen-lockfile",
]

[phases.build]
cmds = [
  "pnpm --filter @tribohub/db generate",
  "pnpm --filter @tribohub/config build",
  "pnpm --filter @tribohub/db build",
  "pnpm --filter @tribohub/api build",
]
