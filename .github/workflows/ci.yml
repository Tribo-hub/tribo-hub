name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # URL usada no build estático do front (placeholder de CI)
      NEXT_PUBLIC_API_URL: https://tribohub-production.up.railway.app/api
      # valores DUMMY só para o CI: o @tribohub/config (zod) valida estas vars ao importar
      # (usado nos testes) e o prisma validate precisa resolver os env(). Não conectam em nada.
      DATABASE_URL: postgresql://u:p@localhost:5432/db
      DIRECT_URL: postgresql://u:p@localhost:5432/db
      JWT_ACCESS_SECRET: ci-dummy-access
      JWT_REFRESH_SECRET: ci-dummy-refresh
      COOKIE_SECRET: ci-dummy-cookie
    steps:
      - uses: actions/checkout@v4

      # versão do pnpm vem do campo packageManager do package.json (não duplicar aqui)
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      # pnpm 11 sai com ERR_PNPM_IGNORED_BUILDS nos scripts de prisma/@nestjs;
      # tolera o install e roda os build scripts explicitamente (igual ao Railway).
      - name: Install
        run: pnpm install --frozen-lockfile || true

      - name: Rebuild build-script deps
        run: pnpm rebuild @prisma/client @prisma/engines prisma @nestjs/core

      - name: Prisma generate
        run: pnpm --filter @tribohub/db generate

      - name: Prisma validate
        run: pnpm --filter @tribohub/db exec prisma validate

      - name: Build packages
        run: |
          pnpm --filter @tribohub/config build
          pnpm --filter @tribohub/db build

      - name: Test (API)
        run: pnpm --filter @tribohub/api test

      - name: Build apps
        run: |
          pnpm --filter @tribohub/api build
          pnpm --filter @tribohub/web build
